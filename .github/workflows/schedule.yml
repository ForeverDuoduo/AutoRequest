name: Scheduled Request

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1,6,11,20 * * *"

jobs:
  request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Run request
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: python -m autorequest.main
