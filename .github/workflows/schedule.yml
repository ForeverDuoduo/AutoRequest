name: Scheduled Request

on:
  schedule:
    # CST (UTC+8): 4:00, 9:00, 14:00, 19:00
    - cron: '0 1,6,11,20 * * *'
  workflow_dispatch:

jobs:
  request:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - run: pip install -e .

      - run: python -m autorequest.main
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
